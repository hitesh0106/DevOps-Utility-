

version: "3.8"

services:
 
  devops-hub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE:-2024-01-01}
    image: devops-utility-hub:latest
    container_name: devops-hub
    ports:
      - "80:8080"
      - "443:8443"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devops-network
    labels:
      - "app=devops-utility-hub"
      - "maintainer=hitesh"
      - "version=1.0.0"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

 
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:0.11
    container_name: nginx-exporter
    ports:
      - "9113:9113"
    command:
      - '-nginx.scrape-uri=http://devops-hub:8080/metrics'
    depends_on:
      devops-hub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devops-network
    profiles:
      - monitoring


  # Watchtower - Auto Update Containers
  
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_RESTARTING=true
    restart: unless-stopped
    networks:
      - devops-network
    profiles:
      - monitoring


# Networks

networks:
  devops-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16


# Volumes (if needed later)

volumes:
  nginx-logs:
    driver: local