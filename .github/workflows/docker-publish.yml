

name: Docker Hub Publish

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-utility-hub:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-utility-hub:${{ github.event.release.tag_name || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish Complete
        run: |
          echo ""
          echo "  Docker Hub Publish Complete!"
          echo ""
          echo ""
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/devops-utility-hub"
          echo "  Tag:   ${{ github.event.release.tag_name || 'latest' }}"
          echo ""
          echo ""