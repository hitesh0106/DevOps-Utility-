

name: CI-CD Pipeline DevOps Utility Hub

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Environment Variables

env:
  IMAGE_NAME: devops-utility-hub
  AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
  AWS_REGION: ap-south-1
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}


# Jobs

jobs:

  # JOB 1: Code Quality and Linting

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: List Project Files
        run: |
          echo "===== Project Structure ====="
          find . -type f -not -path './.git/*' | head -50
          echo ""
          echo "===== File Count ====="
          find . -type f -not -path './.git/*' | wc -l

      - name: Validate HTML
        run: |
          echo "Checking HTML file"
          if [ -f "index.html" ]; then
            echo "PASS: index.html exists"
            grep -q "<!DOCTYPE html>" index.html && echo "PASS: DOCTYPE found" || echo "WARN: DOCTYPE missing"
            grep -q "<html" index.html && echo "PASS: HTML tag found" || echo "WARN: HTML tag missing"
            grep -q "<head>" index.html && echo "PASS: HEAD tag found" || echo "WARN: HEAD tag missing"
            grep -q "<body>" index.html && echo "PASS: BODY tag found" || echo "WARN: BODY tag missing"
          else
            echo "FAIL: index.html not found!"
            exit 1
          fi

      - name: Validate CSS
        run: |
          echo "Checking CSS files"
          if [ -f "css/style.css" ]; then
            echo "PASS: style.css exists"
            echo "CSS Size: $(wc -c < css/style.css) bytes"
            echo "CSS Lines: $(wc -l < css/style.css)"
          else
            echo "FAIL: css/style.css not found!"
            exit 1
          fi

      - name: Validate JavaScript
        run: |
          echo "Checking JS files"
          if [ -f "js/script.js" ]; then
            echo "PASS: script.js exists"
            echo "JS Size: $(wc -c < js/script.js) bytes"
            echo "JS Lines: $(wc -l < js/script.js)"
            node -c js/script.js 2>/dev/null && echo "PASS: JS Syntax Valid" || echo "WARN: JS syntax check skipped"
          else
            echo "FAIL: js/script.js not found!"
            exit 1
          fi

      - name: Generate Quality Report
        run: |
          echo ""
          echo "  CODE QUALITY REPORT"
          echo ""
          echo ""
          echo "Files Found:"
          echo "  HTML: $(find . -name '*.html' -not -path './.git/*' | wc -l)"
          echo "  CSS:  $(find . -name '*.css' -not -path './.git/*' | wc -l)"
          echo "  JS:   $(find . -name '*.js' -not -path './.git/*' | wc -l)"
          echo ""
          echo "Total Project Size:"
          du -sh . --exclude=.git 2>/dev/null || echo "N/A"
          echo ""
          echo "Code Quality Check Complete!"
          echo ""


  # JOB 2: Docker Build and Test

  docker-build:
    name: Docker Build and Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          echo "===== Building Docker image ====="
          docker build \
            --tag "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --tag "${{ env.IMAGE_NAME }}:latest" \
            --label "build.sha=${{ github.sha }}" \
            --label "build.date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label "build.repo=${{ github.repository }}" \
            .
          echo " Docker image built successfully "

      - name: Test Docker Container
        run: |
          echo "===== Starting container for testing ====="
          docker run -d \
            --name test-container \
            -p 8080:8080 \
            "${{ env.IMAGE_NAME }}:latest"

          echo "Waiting for container to start..."
          sleep 5

          echo ""
          echo ""
          echo "  RUNNING TESTS"
          echo ""
          echo ""

          PASS_COUNT=0
          FAIL_COUNT=0

          echo -n "Test 1 - Container Running: "
          if docker ps | grep -q test-container; then
            echo "PASS"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          echo -n "Test 2 - Health Endpoint: "
          if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
            echo "PASS"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          echo -n "Test 3 - Main Page: "
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS (HTTP $HTTP_CODE)"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL (HTTP $HTTP_CODE)"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          echo -n "Test 4 - CSS File: "
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/css/style.css)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS (HTTP $HTTP_CODE)"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL (HTTP $HTTP_CODE)"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          echo -n "Test 5 - JS File: "
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/js/script.js)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "PASS (HTTP $HTTP_CODE)"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL (HTTP $HTTP_CODE)"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          echo -n "Test 6 - Content Check: "
          if curl -s http://localhost:8080/ | grep -q "DevOps"; then
            echo "PASS"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "FAIL"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          echo -n "Test 7 - Security Headers: "
          if curl -sI http://localhost:8080/ | grep -q "X-Frame-Options"; then
            echo "PASS"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "WARNING (non-critical)"
          fi

          echo -n "Test 8 - Gzip Compression: "
          if curl -sI -H "Accept-Encoding: gzip" http://localhost:8080/ | grep -qi "gzip"; then
            echo "PASS"
            PASS_COUNT=$((PASS_COUNT + 1))
          else
            echo "WARNING (non-critical)"
          fi

          echo ""
          echo ""
          echo "  RESULTS: $PASS_COUNT passed, $FAIL_COUNT failed"
          echo ""
          echo ""

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "Some critical tests failed!"
            exit 1
          fi

          echo "All critical tests passed!"

      - name: Docker Image Info
        run: |
          echo "===== Docker Image Details ====="
          docker images "${{ env.IMAGE_NAME }}"
          echo ""
          echo "Image Size: $(docker images "${{ env.IMAGE_NAME }}:latest" --format '{{.Size}}')"
          echo ""
          echo "===== Image Layers ====="
          docker history "${{ env.IMAGE_NAME }}:latest" --format "{{.Size}}\t{{.CreatedBy}}" | head -10

      - name: Cleanup Test Container
        if: always()
        run: |
          docker stop test-container 2>/dev/null || true
          docker rm test-container 2>/dev/null || true


  # JOB 3: Push to Docker Hub
  
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:v1.0.0
          labels: |
            maintainer=hitesh
            version=1.0.0
            build.sha=${{ github.sha }}

      - name: Push Complete
        run: |
          echo ""
          echo "  Pushed to Docker Hub!"
          echo "  Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo ""


  # JOB 4: Deploy to AWS S3

  deploy-aws:
    name: Deploy to AWS S3
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          echo ""
          echo "  Deploying to AWS S3"
          echo "  Bucket: ${{ env.AWS_S3_BUCKET }}"
          echo "  Region: ${{ env.AWS_REGION }}"
          echo ""
          echo ""

          echo "--- Uploading index.html (no cache) ---"
          aws s3 cp index.html "s3://${{ env.AWS_S3_BUCKET }}/" \
            --content-type "text/html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE

          echo "--- Syncing CSS files (cache 30 days) ---"
          aws s3 sync css/ "s3://${{ env.AWS_S3_BUCKET }}/css/" \
            --content-type "text/css" \
            --cache-control "public, max-age=2592000, immutable" \
            --delete

          echo "--- Syncing JS files (cache 30 days) ---"
          aws s3 sync js/ "s3://${{ env.AWS_S3_BUCKET }}/js/" \
            --content-type "application/javascript" \
            --cache-control "public, max-age=2592000, immutable" \
            --delete

          echo "--- Syncing images (if exist) ---"
          if [ -d "images" ]; then
            FILE_COUNT=$(find images/ -type f 2>/dev/null | wc -l)
            if [ "$FILE_COUNT" -gt 0 ]; then
              aws s3 sync images/ "s3://${{ env.AWS_S3_BUCKET }}/images/" \
                --cache-control "public, max-age=2592000" \
                --delete
              echo "Uploaded $FILE_COUNT image files"
            else
              echo "No image files found, skipping"
            fi
          else
            echo "No images directory found, skipping"
          fi

          echo ""
          echo ""
          echo "  Deployed to S3 successfully!"
          echo ""

      - name: Invalidate CloudFront Cache
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          echo "Invalidating CloudFront cache..."
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
          echo "CloudFront cache invalidated!"

      - name: Show Website URL
        run: |
          echo ""
          echo ""
          echo "  DEPLOYMENT SUCCESSFUL!"
          echo ""
          echo ""
          echo "  S3 Website URL:"
          echo "  http://${{ env.AWS_S3_BUCKET }}.s3-website.${{ env.AWS_REGION }}.amazonaws.com"
          echo ""
          echo ""


  # JOB 5: Deployment Notification
  
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - docker-build
      - deploy-aws
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Pipeline Summary
        run: |
          echo ""
          echo ""
          echo "  CI/CD PIPELINE SUMMARY"
          echo ""
          echo ""
          echo "  Repository: ${{ github.repository }}"
          echo "  Branch:     ${{ github.ref_name }}"
          echo "  Commit:     ${{ github.sha }}"
          echo "  Author:     ${{ github.actor }}"
          echo "  Timestamp:  $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "  Job Results:"
          echo "    Lint:          ${{ needs.lint.result }}"
          echo "    Docker Build:  ${{ needs.docker-build.result }}"
          echo "    AWS Deploy:    ${{ needs.deploy-aws.result }}"
          echo ""
          echo ""
          echo ""

          LINT_RESULT="${{ needs.lint.result }}"
          BUILD_RESULT="${{ needs.docker-build.result }}"
          DEPLOY_RESULT="${{ needs.deploy-aws.result }}"

          if [ "$LINT_RESULT" = "success" ] && [ "$BUILD_RESULT" = "success" ]; then
            echo "  Pipeline Status: SUCCESS"
          else
            echo "  Pipeline Status: HAS FAILURES"
          fi

          echo ""
          echo ""